<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- Outer border -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#8ab84a" stroke-width="12"/>
  
  <!-- Inner accent bar (left) -->
  <rect x="40" y="40" width="8" height="432" fill="#8ab84a" opacity="0.6"/>
  
  <!-- Map grid background -->
  <g stroke="#8ab84a" stroke-width="2" opacity="0.3">
    <line x1="120" y1="80" x2="120" y2="432"/>
    <line x1="200" y1="80" x2="200" y2="432"/>
    <line x1="280" y1="80" x2="280" y2="432"/>
    <line x1="360" y1="80" x2="360" y2="432"/>
    <line x1="80" y1="150" x2="432" y2="150"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="362" x2="432" y2="362"/>
  </g>
  
  <!-- Gamepad/Controller icon -->
  <g transform="translate(200, 160)">
    <!-- Controller base -->
    <path d="M 20 0 Q 40 0 60 20 L 60 40 Q 40 60 20 60 Q 0 60 0 40 L 0 20 Q 0 0 20 0" fill="none" stroke="#8ab84a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- D-Pad (left side) -->
    <circle cx="15" cy="30" r="2" fill="#8ab84a"/>
    <line x1="15" y1="24" x2="15" y2="36" stroke="#8ab84a" stroke-width="2"/>
    <line x1="9" y1="30" x2="21" y2="30" stroke="#8ab84a" stroke-width="2"/>
    
    <!-- Buttons (right side) -->
    <circle cx="65" cy="20" r="2.5" fill="#8ab84a"/>
    <circle cx="72" cy="30" r="2.5" fill="#8ab84a"/>
    <circle cx="65" cy="40" r="2.5" fill="#8ab84a"/>
    <circle cx="58" cy="30" r="2.5" fill="#8ab84a"/>
  </g>
  
  <!-- Crosshair/targeting reticle -->
  <g transform="translate(256, 300)" stroke="#8ab84a" stroke-width="3" stroke-linecap="round">
    <!-- Vertical line -->
    <line x1="0" y1="-20" x2="0" y2="20"/>
    <!-- Horizontal line -->
    <line x1="-20" y1="0" x2="20" y2="0"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#8ab84a"/>
    <!-- Corner brackets -->
    <line x1="-14" y1="-14" x2="-8" y2="-14"/>
    <line x1="-14" y1="-14" x2="-14" y2="-8"/>
    <line x1="14" y1="-14" x2="8" y2="-14"/>
    <line x1="14" y1="-14" x2="14" y2="-8"/>
    <line x1="-14" y1="14" x2="-8" y2="14"/>
    <line x1="-14" y1="14" x2="-14" y2="8"/>
    <line x1="14" y1="14" x2="8" y2="14"/>
    <line x1="14" y1="14" x2="14" y2="8"/>
  </g>
  
  <!-- Top accent bar -->
  <line x1="80" y1="60" x2="432" y2="60" stroke="#c8a84b" stroke-width="3" opacity="0.7"/>
  
  <!-- Scanlines effect -->
  <g stroke="#8ab84a" stroke-width="1" opacity="0.1">
    <line x1="20" y1="100" x2="492" y2="100"/>
    <line x1="20" y1="140" x2="492" y2="140"/>
    <line x1="20" y1="180" x2="492" y2="180"/>
    <line x1="20" y1="220" x2="492" y2="220"/>
    <line x1="20" y1="260" x2="492" y2="260"/>
    <line x1="20" y1="300" x2="492" y2="300"/>
    <line x1="20" y1="340" x2="492" y2="340"/>
    <line x1="20" y1="380" x2="492" y2="380"/>
    <line x1="20" y1="420" x2="492" y2="420"/>
  </g>
</svg>
